name: Drops refresh

on:
  schedule:
    # Every 4 hours, on the hour.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit refresh endpoint
        run: |
          curl --fail --silent --show-error --max-time 120 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DROPS_REFRESH_SECRET }}" \
            "${{ vars.APP_URL }}/api/drops/refresh"
